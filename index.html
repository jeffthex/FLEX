<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>AI Flexão Rep Counter</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, sans-serif; 
            text-align: center; 
            margin: 0; 
            overflow: hidden; 
        }
        #top-bar { 
            position: fixed; 
            top: 10px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            font-size: 8rem; 
            font-weight: bold; 
            color: #00FF00; 
            z-index: 100;
        }
        /* Container para sobrepor vídeo e canvas */
        .video-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        video, canvas { 
            position: absolute; 
            max-width: 100%; 
            max-height: 100%; 
            border-radius: 15px; 
            /* Espelha a imagem para o usuário */
            transform: scaleX(-1); 
        }
        /* Garante que o canvas (desenho) fique na frente do vídeo */
        canvas { 
            z-index: 10; 
        }
        button { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            padding: 15px; 
            background: #007aff; 
            color: #fff; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px; 
            z-index: 110;
        }
    </style>
</head>
<body>
    <div id="top-bar">0</div>
    
    <div class="video-container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <button onclick="ativarNotificacao()">Ativar Notificações</button>
    <script src="app.js"></script>
</body>
</html>
